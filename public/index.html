<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>污水处理厂运行管理系统</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar (desktop) -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo"><span class="logo-icon">🏭</span><span>污水厂管理</span></div>
      <nav class="sidebar-nav">
        <button class="sidebar-item active" data-tab="home"><span class="si-icon">🏠</span>首页</button>
        <button class="sidebar-item" data-tab="fill"><span class="si-icon">📝</span>数据填报</button>
        <button class="sidebar-item" data-tab="data"><span class="si-icon">📊</span>数据查询</button>
        <button class="sidebar-item" data-tab="tools"><span class="si-icon">⚙️</span>智能工具</button>
        <button class="sidebar-item" data-tab="equipment"><span class="si-icon">🔧</span>设备台账</button>
        <button class="sidebar-item" data-tab="shift"><span class="si-icon">🔄</span>交班排班</button>
        <button class="sidebar-item" data-tab="report"><span class="si-icon">📋</span>报表中心</button>
        <button class="sidebar-item" data-tab="me"><span class="si-icon">👤</span>个人中心</button>
      </nav>
      <div class="sidebar-footer">v4.5 智慧水务</div>
    </div>

    <!-- Header -->
    <div class="app-header">
      <h1 id="headerTitle">🏭 污水厂运行管理</h1>
      <div class="header-user">
        <span id="headerRole" class="header-badge"></span>
        <span id="headerName" style="font-size:12px;"></span>
      </div>
    </div>

    <!-- Tab Pages -->
    <div id="page-home" class="page active"></div>
    <div id="page-fill" class="page"></div>
    <div id="page-data" class="page"></div>
    <div id="page-tools" class="page"></div>
    <div id="page-equipment" class="page"></div>
    <div id="page-shift" class="page"></div>
    <div id="page-report" class="page"></div>
    <div id="page-me" class="page"></div>

    <!-- Bottom Tab Bar -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-item active" data-tab="home"><span class="tab-icon">🏠</span>首页</button>
      <button class="tab-item" data-tab="fill"><span class="tab-icon">📝</span>填报</button>
      <button class="tab-item" data-tab="data"><span class="tab-icon">📊</span>数据</button>
      <button class="tab-item" data-tab="tools"><span class="tab-icon">⚙️</span>工具</button>
      <button class="tab-item" data-tab="equipment"><span class="tab-icon">🔧</span>设备</button>
      <button class="tab-item" data-tab="shift"><span class="tab-icon">🔄</span>交班</button>
      <button class="tab-item" data-tab="report"><span class="tab-icon">📋</span>报表</button>
      <button class="tab-item" data-tab="me" style="position:relative;"><span class="tab-icon">👤</span>我的<span class="tab-badge hidden" id="tabAlertBadge">0</span></button>
    </div>

    <!-- Modal overlay -->
    <div class="modal-overlay hidden" id="modalOverlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Toast -->
    <div id="toastContainer"></div>
  </div>

  <script src="/lib/chart.umd.min.js"></script>
  <script>
    // Chart.js 加载失败保护
    if (typeof Chart === 'undefined') {
      window.Chart = function() { console.warn('Chart.js 未加载，图表不可用'); return { destroy(){}, update(){} }; };
    }
    // 全局错误捕获 - 防止 JS 异常导致白屏
    window.onerror = function(msg, url, line, col, err) {
      console.error('全局错误:', msg, '行:', line);
      var tc = document.getElementById('toastContainer');
      if (tc) { var d = document.createElement('div'); d.className = 'toast error'; d.textContent = '页面错误: ' + msg; tc.appendChild(d); setTimeout(function(){ d.remove(); }, 5000); }
      return true;
    };
    window.onunhandledrejection = function(e) {
      console.error('未捕获的Promise错误:', e.reason);
    };
  </script>
  <script>
    // ==================== 全局状态 ====================
    const API = window.location.origin;
    let currentUser = null, currentPermissions = null, currentTab = 'home';
    let chartInstances = {};

    // ==================== 初始化 ====================
    (async function init() {
      try {
        const token = localStorage.getItem('sb_token');
        const userStr = localStorage.getItem('sb_user');
        let user = null;
        try { user = JSON.parse(userStr || 'null'); } catch(e) {}
        if (!token || !user) { window.location.href = '/login.html'; return; }
        currentUser = user;
        currentPermissions = user.permissions || {};

        // 验证 token 是否仍有效
        try {
          const verifyRes = await fetch(API + '/api/stats/summary', { headers: authHeaders() });
          if (verifyRes.status === 401) {
            localStorage.removeItem('sb_token');
            localStorage.removeItem('sb_user');
            window.location.href = '/login.html';
            return;
          }
        } catch(e) {
          // 网络不通也允许进入（离线模式）
          console.warn('Token验证网络错误:', e);
        }

        // 设置 header
        const roleCls = { '厂长': 'admin', '副厂长': 'admin', '运营管理部': 'ops', '技术管理部': 'tech', '文员': 'clerk', '运营班组': 'ops', '化验主管': 'tech', '化验员': 'tech' };
        document.getElementById('headerName').textContent = user.name;
        const badge = document.getElementById('headerRole');
        badge.textContent = user.role;
        badge.className = 'header-badge ' + (roleCls[user.role] || '');

        // Tab 切换
        document.querySelectorAll('.tab-item').forEach(btn => {
          btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
        });
        // Sidebar 切换
        document.querySelectorAll('.sidebar-item').forEach(btn => {
          btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
        });

        // 加载首页
        switchTab('home');
        loadAlertBadge();
        setInterval(loadAlertBadge, 60000);
      } catch(e) {
        console.error('初始化失败:', e);
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;"><h2>页面加载失败</h2><p>' + e.message + '</p><button onclick="localStorage.clear();location.href=\'/login.html\'" style="margin-top:16px;padding:8px 24px;cursor:pointer;">重新登录</button></div>';
      }
    })();

    async function loadAlertBadge() {
      try {
        const res = await fetch(API + '/api/alerts/active', { headers: authHeaders() });
        const alerts = await res.json();
        const badge = document.getElementById('tabAlertBadge');
        if (alerts.length > 0) { badge.textContent = alerts.length; badge.classList.remove('hidden'); }
        else { badge.classList.add('hidden'); }
      } catch {}
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-item').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.sidebar-item').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + tab).classList.add('active');

      const titles = { home: '🏭 污水厂运行管理', fill: '📝 数据填报', data: '📊 数据查询', tools: '⚙️ 智能工具', equipment: '🔧 设备台账', shift: '🔄 交班排班', report: '📋 报表中心', me: '👤 个人中心' };
      document.getElementById('headerTitle').textContent = titles[tab] || '污水厂运行管理';

      switch (tab) {
        case 'home': renderHome(); break;
        case 'fill': renderFill(); break;
        case 'data': renderData(); break;
        case 'tools': renderTools(); break;
        case 'equipment': renderEquipment(); break;
        case 'shift': renderShift(); break;
        case 'report': renderReport(); break;
        case 'me': renderMe(); break;
      }
    }

    // ==================== 工具函数 ====================
    function authHeaders() {
      return { 'Authorization': 'Bearer ' + localStorage.getItem('sb_token'), 'Content-Type': 'application/json' };
    }
    function toast(msg, type) {
      type = type || 'success';
      const c = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast ' + type; el.textContent = msg; c.appendChild(el);
      setTimeout(() => { el.remove(); }, 2500);
    }
    function openModal(html) {
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modalOverlay').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
    function formatDate(d) { return d ? new Date(d).toISOString().slice(0, 10) : ''; }

    // ==================== 首页 ====================
    async function renderHome() {
      const page = document.getElementById('page-home');
      page.innerHTML = '<div class="loading">加载中...</div>';
      try {
        const [statsRes, streamRes] = await Promise.all([
          fetch(API + '/api/stats/summary', { headers: authHeaders() }),
          fetch(API + '/api/stream', { headers: authHeaders() })
        ]);
        const stats = await statsRes.json();
        const stream = await streamRes.json();

        // 信息滚动条
        let tickerHtml = '<div class="info-ticker"><div class="info-ticker-label">📡 实时动态</div><div class="info-ticker-wrap"><div class="info-ticker-track">';
        const items = (stream.items || []).slice(0, 20);
        if (items.length === 0) {
          tickerHtml += '<span style="color:rgba(255,255,255,0.4);padding:0 16px;">暂无动态</span>';
        } else {
          const tagClass = { '异常': 'anomaly', '报送': 'submit', '动态': 'dynamic' };
          for (let loop = 0; loop < 2; loop++) {
            items.forEach((item, i) => {
              tickerHtml += '<span class="info-ticker-item"><span class="ticker-tag ' + (tagClass[item.type] || '') + '">' + (item.tag || item.type) + '</span> ' + item.icon + ' ' + item.title + '</span>';
              if (i < items.length - 1) tickerHtml += '<span style="color:rgba(255,255,255,0.2);margin:0 4px;">|</span>';
            });
          }
        }
        tickerHtml += '</div></div></div>';

        // 统计卡片
        let statsHtml = '<div class="stats-grid">';
        statsHtml += '<div class="stat-card danger"><div class="stat-value">' + stats.alerts.active + '</div><div class="stat-label">⚠️ 活跃预警</div></div>';
        statsHtml += '<div class="stat-card warning"><div class="stat-value">' + stats.tasks.pending + '</div><div class="stat-label">📝 待办任务</div></div>';
        statsHtml += '<div class="stat-card primary"><div class="stat-value">' + stats.today.inspection + '</div><div class="stat-label">🔍 今日巡检</div></div>';
        statsHtml += '<div class="stat-card success"><div class="stat-value">' + stats.today.lab + '</div><div class="stat-label">🧪 今日化验</div></div>';
        statsHtml += '</div>';

        // 快捷操作
        const canFill = currentPermissions.fillOps || currentPermissions.fillLab || currentPermissions.canManage;
        let actionsHtml = '<div class="card"><div class="card-header"><h3>快捷操作</h3></div><div class="card-body"><div class="quick-actions">';
        if (canFill) {
          actionsHtml += '<button class="quick-action" onclick="switchTab(\'fill\')"><span class="qa-icon">📝</span>数据填报</button>';
          actionsHtml += '<button class="quick-action" onclick="openDosingModal()"><span class="qa-icon">🧮</span>智能加药</button>';
        }
        actionsHtml += '<button class="quick-action" onclick="switchTab(\'data\')"><span class="qa-icon">📊</span>趋势分析</button>';
        actionsHtml += '<button class="quick-action" onclick="openSludgeAnalysis()"><span class="qa-icon">🦠</span>污泥分析</button>';
        actionsHtml += '<button class="quick-action" onclick="switchTab(\'tools\')"><span class="qa-icon">📦</span>库存管理</button>';
        if (currentPermissions.canManage || currentPermissions.canExport) {
          actionsHtml += '<button class="quick-action" onclick="switchTab(\'tools\')\"><span class="qa-icon">📤</span>数据导出</button>';
        }
        actionsHtml += '</div></div></div>';

        // 欢迎卡片
        const hour = new Date().getHours();
        const greeting = hour < 12 ? '早上好' : hour < 18 ? '下午好' : '晚上好';
        let welcomeHtml = '<div class="card"><div class="card-body" style="display:flex;align-items:center;gap:12px;">';
        welcomeHtml += '<div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#1890ff,#096dd9);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;">' + (currentUser.name || '?')[0] + '</div>';
        welcomeHtml += '<div><div style="font-size:16px;font-weight:600;">' + greeting + '，' + currentUser.name + '</div><div style="font-size:12px;color:#8c8c8c;">' + currentUser.role + ' · 今天是 ' + new Date().toLocaleDateString('zh-CN') + '</div></div>';
        welcomeHtml += '</div></div>';

        // (快捷入口已整合到快捷操作中，不再单独显示)

        // 首页布局：顶部全宽 + 下面双列均衡
        let topSection = tickerHtml + welcomeHtml;
        let leftCol = statsHtml + actionsHtml;
        let rightCol = '<div class="card"><div class="card-header"><h3>⚠️ 最近预警</h3><span style="font-size:12px;color:#1890ff;cursor:pointer;" onclick="switchTab(\'tools\')">全部 →</span></div><div class="card-body no-padding">';
        const alerts = (stream.items || []).filter(i => i.type === '异常').slice(0, 5);
        if (alerts.length === 0) rightCol += '<div class="empty">暂无预警</div>';
        else alerts.forEach(a => {
          rightCol += '<div class="alert-item"><div class="al-icon">' + a.icon + '</div><div class="al-body"><div class="al-title">' + a.title + '</div><div class="al-detail">' + a.detail + '</div><div class="al-meta"><span>' + a.tag + '</span></div></div></div>';
        });
        rightCol += '</div></div>';

        // 最近动态
        rightCol += '<div class="card"><div class="card-header"><h3>📡 最近动态</h3></div><div class="card-body no-padding">';
        const recentItems = (stream.items || []).slice(0, 6);
        if (recentItems.length === 0) rightCol += '<div class="empty">暂无动态</div>';
        else recentItems.forEach(item => {
          const timeStr = item.time ? new Date(item.time).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
          rightCol += '<div class="timeline-item ' + item.type + '"><div class="tl-icon">' + item.icon + '</div><div class="tl-body"><div class="tl-title">' + item.title + '</div><div class="tl-detail">' + item.detail + '</div><div class="tl-meta"><span class="tl-tag ' + item.type + (item.level === 'high' ? ' high' : '') + '">' + (item.tag || item.type) + '</span><span>' + timeStr + '</span></div></div></div>';
        });
        rightCol += '</div></div>';

        page.innerHTML = '<div class="dashboard-grid">' +
          '<div class="dashboard-top">' + topSection + '</div>' +
          '<div class="dashboard-left">' + leftCol + '</div>' +
          '<div class="dashboard-right">' + rightCol + '</div>' +
          '</div>';
      } catch (e) { page.innerHTML = '<div class="loading">加载失败，请刷新重试</div>'; }
    }

    // ==================== 填报中心 ====================
    function renderFill() {
      const page = document.getElementById('page-fill');
      const isOps = currentPermissions.fillOps || currentPermissions.isOps || currentPermissions.canManage;
      const isLab = currentPermissions.fillLab || currentPermissions.reviewLab || currentPermissions.isTech || currentPermissions.canManage;

      let html = '<div class="page-header"><h2>数据填报</h2><p>选择填报类型</p></div><div class="fill-grid">';

      if (isOps) {
        html += '<div class="fill-entry" onclick="openFillForm(\'do_inspection\')"><div class="fe-icon">🔍</div><div class="fe-title">DO巡检</div><div class="fe-count">东西系列·6池DO</div></div>';
        html += '<div class="fill-entry" onclick="openFillForm(\'hourly_water\')"><div class="fe-icon">💧</div><div class="fe-title">小时进出水</div><div class="fe-count">24小时逐时记录</div></div>';
        html += '<div class="fill-entry" onclick="openFillForm(\'chemical_dosing\')"><div class="fe-icon">🧪</div><div class="fe-title">药剂投加</div><div class="fe-count">6种药剂记录</div></div>';
        html += '<div class="fill-entry" onclick="openFillForm(\'chemical_inventory\')"><div class="fe-icon">📦</div><div class="fe-title">药剂出入库</div><div class="fe-count">库存管理</div></div>';
        html += '<div class="fill-entry" onclick="openFillForm(\'dewatering\')"><div class="fe-icon">🔄</div><div class="fe-title">脱泥生产</div><div class="fe-count">运行记录</div></div>';
        html += '<div class="fill-entry" onclick="openFillForm(\'daily_summary\')"><div class="fe-icon">📊</div><div class="fe-title">每日报表</div><div class="fe-count">电量/水量汇总</div></div>';
      }

      if (isLab) {
        html += '<div class="fill-entry" onclick="openFillForm(\'daily_lab\')"><div class="fe-icon">🧫</div><div class="fe-title">每日化验</div><div class="fe-count">18项指标</div></div>';
        html += '<div class="fill-entry" onclick="openFillForm(\'weekly_lab\')"><div class="fe-icon">📅</div><div class="fe-title">每周化验</div><div class="fe-count">4项指标</div></div>';
        html += '<div class="fill-entry" onclick="openFillForm(\'sludge_special\')"><div class="fe-icon">🪨</div><div class="fe-title">污泥专项</div><div class="fe-count">3项指标</div></div>';
      }

      if (!isOps && !isLab) {
        html = '<div class="page-header"><h2>数据填报</h2></div><div class="card"><div class="card-body"><div class="empty">当前角色无填报权限</div></div></div>';
      }

      html += '</div>';
      page.innerHTML = html;
    }

    // 通用填报表单
    function openFillForm(table) {
      const forms = {
        do_inspection: {
          title: 'DO巡检记录',
          fields: [
            { section: '基本信息' },
            { name: 'date', label: '日期', type: 'date', required: true, default: new Date().toISOString().slice(0,10) },
            { name: 'shift', label: '班次', type: 'select', options: ['白班','夜班'], required: true },
            { name: 'series', label: '系列', type: 'select', options: ['east','west'], labels: ['东系列','西系列'], required: true },
            { section: '溶解氧数值 (mg/L)' },
            { name: 'anaerobic', label: '厌氧池 DO', type: 'number', step: '0.01', placeholder: '需<0.2 mg/L' },
            { name: 'anoxic', label: '缺氧池 DO', type: 'number', step: '0.01', placeholder: '需<0.5 mg/L' },
            { name: 'aerobic1', label: '好氧池1 DO', type: 'number', step: '0.01', placeholder: '正常2.5-4.5 mg/L' },
            { name: 'aerobic2', label: '好氧池2 DO', type: 'number', step: '0.01', placeholder: '正常2.5-4.5 mg/L' },
            { name: 'aerobic3', label: '好氧池3 DO', type: 'number', step: '0.01', placeholder: '正常2.5-4.5 mg/L' },
            { name: 'aerobic4', label: '好氧池4 DO', type: 'number', step: '0.01', placeholder: '正常2.5-4.5 mg/L' },
            { name: 'remark', label: '备注', type: 'textarea', placeholder: '异常情况说明...' },
          ]
        },
        hourly_water: {
          title: '小时进出水记录',
          fields: [
            { section: '基本信息' },
            { name: 'date', label: '日期', type: 'date', required: true, default: new Date().toISOString().slice(0,10) },
            { name: 'hour', label: '小时 (0-23)', type: 'number', min: 0, max: 23, required: true, default: new Date().getHours() },
            { section: '进水指标' },
            { name: 'inCod', label: '进水COD (mg/L)', type: 'number', step: '0.1' },
            { name: 'inNh3', label: '进水氨氮 (mg/L)', type: 'number', step: '0.01' },
            { name: 'inTn', label: '进水总氮 (mg/L)', type: 'number', step: '0.01' },
            { name: 'inTp', label: '进水总磷 (mg/L)', type: 'number', step: '0.01' },
            { name: 'inFlow', label: '进水流量 (m³/h)', type: 'number', step: '0.1' },
            { name: 'inPh', label: '进水pH', type: 'number', step: '0.01' },
            { section: '出水指标' },
            { name: 'outCod', label: '出水COD (mg/L)', type: 'number', step: '0.1' },
            { name: 'outNh3', label: '出水氨氮 (mg/L)', type: 'number', step: '0.01' },
            { name: 'outTn', label: '出水总氮 (mg/L)', type: 'number', step: '0.01' },
            { name: 'outTp', label: '出水总磷 (mg/L)', type: 'number', step: '0.01' },
            { name: 'outFlow', label: '出水流量 (m³/h)', type: 'number', step: '0.1' },
            { name: 'outPh', label: '出水pH', type: 'number', step: '0.01' },
          ]
        },
        daily_lab: {
          title: '每日化验记录',
          fields: [
            { section: '基本信息' },
            { name: 'date', label: '日期', type: 'date', required: true, default: new Date().toISOString().slice(0,10) },
            { section: '水质指标' },
            { name: 'ph', label: 'pH', type: 'number', step: '0.01' },
            { name: 'ss', label: 'SS (mg/L)', type: 'number', step: '0.1' },
            { name: 'bod5', label: 'BOD5 (mg/L)', type: 'number', step: '0.1' },
            { name: 'cod', label: 'COD (mg/L)', type: 'number', step: '0.1' },
            { name: 'nh3', label: '氨氮 (mg/L)', type: 'number', step: '0.01' },
            { name: 'tn', label: '总氮 (mg/L)', type: 'number', step: '0.01' },
            { name: 'tp', label: '总磷 (mg/L)', type: 'number', step: '0.01' },
            { name: 'fecalColiform', label: '粪大肠菌群 (MPN/L)', type: 'number' },
            { section: '污泥工艺指标' },
            { name: 'sv30', label: 'SV30 (%)', type: 'number', step: '0.1' },
            { name: 'svi', label: 'SVI (mL/g)', type: 'number', step: '0.1' },
            { name: 'mlss', label: 'MLSS (mg/L)', type: 'number' },

            { section: '运行参数' },

    async function submitFillForm(e, table) {
      e.preventDefault();
      const fd = new FormData(e.target);
      const record = { id: table + '_' + Date.now(), createTime: new Date().toISOString(), operator: currentUser.name };
      for (const [k, v] of fd.entries()) { if (v !== '') record[k] = v; }
      try {
        const res = await fetch(API + '/api/' + table, { method: 'POST', headers: authHeaders(), body: JSON.stringify(record) });
        const data = await res.json();
        if (data.success) { toast('提交成功'); closeModal(); loadAlertBadge(); }
        else toast(data.error || '提交失败', 'error');
      } catch (e) { toast('网络错误', 'error'); }
    }

    // 一键下载报表
    function downloadReport(table) {
      const token = localStorage.getItem('sb_token');
      if (!token) { toast('请先登录', 'error'); return; }
      const url = API + '/api/export/' + table + '?token=' + token;
      const a = document.createElement('a');
      a.href = url;
      a.download = table + '_' + new Date().toISOString().slice(0,10) + '.xlsx';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      toast('正在下载 ' + table + ' 报表...', 'success');
    }

    async function openDataView(table, name) {
      try {
        const [res, fieldsRes] = await Promise.all([
          fetch(API + '/api/' + table + '?limit=50', { headers: authHeaders() }),
          fetch(API + '/api/fields/' + table, { headers: authHeaders() }).catch(() => ({ json: () => ({}) }))
        ]);
        const result = await res.json();
        const fields = await fieldsRes.json();
        const data = result.data || result || [];
        let html = '<div class="modal-header"><h3>' + name + ' (' + (result.total || data.length) + '条)</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>';
        html += '<div class="modal-body"><div class="table-wrapper"><table><thead><tr>';
        if (data.length > 0) {
          const keys = Object.keys(data[0]).filter(k => !k.startsWith('_') && k !== 'password');
          keys.forEach(k => html += '<th>' + (fields[k] || k) + '</th>');
          html += '</tr></thead><tbody>';
          data.forEach(row => {
            html += '<tr>';
            keys.forEach(k => {
              let v = row[k];
              if (k === 'reviewStatus' && v === 'pending') v = '待审核';
              else if (k === 'reviewStatus' && v === 'approved') v = '已审核';
              else if (k === 'type' && table === 'chemical_inventory') { if (v === 'in') v = '入库'; else if (v === 'out') v = '出库'; else if (v === 'use') v = '消耗'; }
              else if (k === 'type' && table === 'alerts') { if (v === 'alert') v = '预警'; }
              else if (k === 'status' && table === 'alerts') { if (v === 'active') v = '活跃'; else if (v === 'resolved') v = '已处理'; }
              else if (k === 'status' && table === 'tasks') { if (v === '待处理') v = '⏳待处理'; else if (v === '处理中') v = '🔄处理中'; else if (v === '已完成') v = '✅已完成'; }
              else if (k === 'status' && table === 'users') { if (v === 'active') v = '✅启用'; else v = '❌禁用'; }
              else if (k === 'chemicalType' && v) { const m = { carbonSource:'碳源', glucose:'葡萄糖', pac:'PAC', anionPam:'阴离子PAM', cationPam:'阳离子PAM', naclo:'次氯酸钠' }; v = m[v] || v; }
              else if (k === 'series' && v) { v = v === 'east' ? '东系列' : v === 'west' ? '西系列' : v; }
              else if (k === 'runStatus' && v) { if (v === '正常运行') v = '✅正常运行'; else if (v === '设备检修') v = '🔧设备检修'; else if (v === '异常停机') v = '❌异常停机'; }
              html += '<td>' + (v !== undefined && v !== null ? String(v).slice(0, 40) : '-') + '</td>';
            });
            html += '</tr>';
          });
        }
        html += '</tbody></table></div></div>';
        html += '<div class="modal-footer"><button class="btn btn-primary" onclick="exportTable(\'' + table + '\')">📥 导出Excel</button><button class="btn btn-outline" onclick="closeModal()">关闭</button></div>';
        openModal(html);
      } catch (e) { toast('加载失败', 'error'); }
    }

    // ==================== 趋势图（增强版） ====================

    async function openTrends(type) {
      const names = { water: '进出水水质趋势', do: '各池DO波动', sludge: '污泥指标趋势', chemical: '药剂投加趋势' };

      if (type === 'do') {

        html += '<button class="series-btn" id="seriesWest" onclick="switchSeries(\'west\')">西系列</button>';
        html += '<button class="series-btn" id="seriesBoth" onclick="switchSeries(\'both\')">对比</button>';
        html += '</div>';
      }
      html += '<button class="modal-close" onclick="closeModal()">&times;</button></div></div>';
      html += '<div class="modal-body">';
      html += '<div class="filter-bar">';
      html += '<button class="filter-chip active" id="range7" onclick="loadTrendChart(\'' + type + '\',7)">近7天</button>';
      html += '<button class="filter-chip" id="range30" onclick="loadTrendChart(\'' + type + '\',30)">近30天</button>';
      html += '<button class="filter-chip" onclick="toggleFullscreen()" style="margin-left:auto;">⛶ 全屏</button>';
      html += '</div>';
      html += '<div id="thresholdLegend"></div>';
      html += '<div class="chart-container" id="trendChartWrap"><canvas id="trendChart"></canvas></div>';
      html += '<div id="trendStats"></div>';
      html += '</div>';
      openModal(html);
      await loadTrendChart(type, 7);
    }

    function switchSeries(s) {
      currentTrendSeries = s;
      document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('series' + s.charAt(0).toUpperCase() + s.slice(1)).classList.add('active');
      loadTrendChart(currentTrendType, currentTrendRange);
    }

    function toggleFullscreen() {
      const overlay = document.querySelector('.modal-overlay');
      if (overlay) overlay.classList.toggle('chart-fullscreen');
    }

    async function loadTrendChart(type, range) {
      currentTrendRange = range;
      document.querySelectorAll('.filter-chip[id^="range"]').forEach(c => c.classList.remove('active'));
      const btn = document.getElementById('range' + range);
      if (btn) btn.classList.add('active');

      try {
        const seriesParam = type === 'do' ? '&series=' + currentTrendSeries : '';
        const res = await fetch(API + '/api/trends?type=' + type + '&range=' + range + seriesParam, { headers: authHeaders() });
        const data = await res.json();

        const ctx = document.getElementById('trendChart');
        if (!ctx) return;
        if (chartInstances.trend) chartInstances.trend.destroy();

        // 检查是否有有效数据
        const hasData = data.datasets && data.datasets.some(ds => ds.data && ds.data.some(v => v !== null && v !== undefined));
        if (!hasData) {
          const legendDiv = document.getElementById('thresholdLegend');
          if (legendDiv) legendDiv.innerHTML = '';
          const statsDiv = document.getElementById('trendStats');
          if (statsDiv) statsDiv.innerHTML = '<div style="text-align:center;padding:24px;color:#8c8c8c;font-size:13px;">📊 暂无数据，请先录入相关记录后查看趋势</div>';
          chartInstances.trend = new Chart(ctx, {
            type: 'line',
            data: { labels: data.labels || [], datasets: [] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
          });
          return;
        }

        // 构建阈值注解线（通过annotation plugin或手动dataset）
        const thresholdDatasets = (data.thresholds || []).map(t => ({
          label: t.label,
          data: new Array(data.labels.length).fill(t.value),
          borderColor: t.color,
          borderDash: t.dash || [6, 4],
          borderWidth: 1.5,
          pointRadius: 0,
          pointHoverRadius: 0,
          fill: false,
          yAxisID: t.yAxisID || undefined,
        }));

        // 构建阈值图例
        const legendDiv = document.getElementById('thresholdLegend');
        if (legendDiv && data.thresholds && data.thresholds.length > 0) {
          legendDiv.innerHTML = '<div class="threshold-legend">' +
            data.thresholds.map(t => '<div class="threshold-item"><div class="threshold-line" style="border-color:' + t.color + ';"></div>' + t.label + '</div>').join('') +
            '</div>';
        } else if (legendDiv) {
          legendDiv.innerHTML = '';
        }

        const allDatasets = [...data.datasets, ...thresholdDatasets];

        const isSludge = type === 'sludge';
        const isDO = type === 'do';

        chartInstances.trend = new Chart(ctx, {
          type: 'line',
          data: { labels: data.labels, datasets: allDatasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8, font: { size: 10 }, usePointStyle: true } },
              tooltip: {
                mode: 'index', intersect: false,
                callbacks: {
                  label: function(ctx) {
                    if (ctx.dataset.label && ctx.parsed.y !== null) {
                      const unit = isDO ? ' mg/L' : isSludge ? (ctx.dataset.yAxisID === 'y1' ? ' mg/L' : ' %') : ' mg/L';
                      return ctx.dataset.label + ': ' + ctx.parsed.y + unit;
                    }
                    return '';
                  }
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { font: { size: 10 } },
                title: { display: true, text: isDO ? 'DO (mg/L)' : isSludge ? 'SV30 (%)' : '浓度 (mg/L)', font: { size: 10 } },
              },
              y1: isSludge ? {
                position: 'right', beginAtZero: true,
                ticks: { font: { size: 10 } },
                title: { display: true, text: 'MLSS (mg/L)', font: { size: 10 } },
                grid: { drawOnChartArea: false }
              } : undefined,
              x: { ticks: { font: { size: 10 }, maxTicksLimit: range <= 7 ? 7 : 10 } }
            },
            interaction: { intersect: false, mode: 'index' },
            elements: { point: { radius: 3, hoverRadius: 5 } }
          }
        });

        // 渲染统计摘要
        renderTrendStats(type, data.summary, range);

      } catch (e) { console.error(e); toast('趋势数据加载失败', 'error'); }
    }

    function renderTrendStats(type, summary, range) {
      const statsDiv = document.getElementById('trendStats');
      if (!statsDiv || !summary || Object.keys(summary).length === 0) return;

      let html = '<div style="font-size:12px;color:#8c8c8c;margin:8px 0 4px;">📊 统计摘要（' + (summary.dataDays || 0) + '/' + (summary.totalDays || range) + '天有数据）</div>';

      if (type === 'do') {
        const poolNames = { anaerobic: '厌氧池', anoxic: '缺氧池', aerobic1: '好氧池1', aerobic2: '好氧池2', aerobic3: '好氧池3', aerobic4: '好氧池4' };
        html += '<div class="trend-stats">';
        for (const [key, name] of Object.entries(poolNames)) {
          if (!summary[key]) continue;
          const s = summary[key];
          const isExceed = s.exceedCount > 0;
          const cls = isExceed ? 'danger' : 'success';
          let thresholdText = '';
          if (key === 'anaerobic') thresholdText = '需<0.2 mg/L';
          else if (key === 'anoxic') thresholdText = '需<0.5 mg/L';
          else thresholdText = s.upperLimit ? s.threshold + '~' + s.upperLimit + ' mg/L' : '≥' + s.threshold;

          html += '<div class="trend-stat-item ' + cls + '">';
          html += '<div class="ts-label">' + name + '</div>';
          html += '<div class="ts-value">' + (s.avg !== null ? s.avg : '-') + ' <small style="font-size:10px;font-weight:400;">mg/L</small></div>';
          html += '<div class="ts-sub">范围 ' + (s.min !== null ? s.min : '-') + ' ~ ' + (s.max !== null ? s.max : '-') + ' | ' + thresholdText;
          if (isExceed) html += ' | <span class="exceed">⚠ 超标' + s.exceedCount + '次(' + s.exceedRate + '%)</span>';
          else html += ' | <span class="comply">✓ 达标</span>';
          html += '</div></div>';
        }
        html += '</div>';
      } else if (type === 'water') {
        const waterNames = { outCod: '出水COD', outNh3: '出水氨氮', outTn: '出水总氮', outTp: '出水总磷' };
        const limits = { outCod: 50, outNh3: 5, outTn: 15, outTp: 0.5 };
        html += '<div class="trend-stats">';
        for (const [key, name] of Object.entries(waterNames)) {
          if (!summary[key]) continue;
          const s = summary[key];
          const isExceed = s.exceedCount > 0;
          const cls = isExceed ? 'danger' : 'success';
          html += '<div class="trend-stat-item ' + cls + '">';
          html += '<div class="ts-label">' + name + '（限值' + limits[key] + '）</div>';
          html += '<div class="ts-value">' + (s.avg !== null ? s.avg : '-') + ' <small style="font-size:10px;font-weight:400;">mg/L</small></div>';
          html += '<div class="ts-sub">范围 ' + (s.min !== null ? s.min : '-') + ' ~ ' + (s.max !== null ? s.max : '-');
          if (isExceed) html += ' | <span class="exceed">⚠ 超标' + s.exceedCount + '次（达标率' + s.complianceRate + '%）</span>';
          else html += ' | <span class="comply">✓ 达标率100%</span>';
          html += '</div></div>';
        }
        html += '</div>';
      } else if (type === 'sludge') {
        html += '<div class="trend-stats">';
        if (summary.sv30) {
          const s = summary.sv30;
          const isExceed = s.exceedCount > 0;
          html += '<div class="trend-stat-item ' + (isExceed ? 'warning' : 'success') + '">';
          html += '<div class="ts-label">SV30（正常≤30%）</div>';
          html += '<div class="ts-value">' + (s.avg !== null ? s.avg : '-') + ' <small style="font-size:10px;font-weight:400;">%</small></div>';
          html += '<div class="ts-sub">范围 ' + (s.min !== null ? s.min : '-') + ' ~ ' + (s.max !== null ? s.max : '-');
          if (isExceed) html += ' | ⚠ 超标' + s.exceedCount + '次';
          else html += ' | ✓ 正常';
          html += '</div></div>';
        }
        if (summary.mlss) {
          const s = summary.mlss;
          const isAbnormal = s.lowCount > 0 || s.highCount > 0;
          html += '<div class="trend-stat-item ' + (isAbnormal ? 'warning' : 'success') + '">';
          html += '<div class="ts-label">MLSS（正常2000~4000）</div>';
          html += '<div class="ts-value">' + (s.avg !== null ? s.avg : '-') + ' <small style="font-size:10px;font-weight:400;">mg/L</small></div>';
          html += '<div class="ts-sub">范围 ' + (s.min !== null ? s.min : '-') + ' ~ ' + (s.max !== null ? s.max : '-');
          if (s.lowCount > 0) html += ' | ⚠ 偏低' + s.lowCount + '次';
          if (s.highCount > 0) html += ' | ⚠ 偏高' + s.highCount + '次';
          if (!isAbnormal) html += ' | ✓ 正常';
          html += '</div></div>';
        }
        html += '</div>';
      } else if (type === 'chemical') {
        const chemNames = { carbonSource: '碳源', pac: 'PAC', glucose: '葡萄糖' };
        html += '<div class="trend-stats">';
        for (const [key, name] of Object.entries(chemNames)) {
          if (!summary[key]) continue;
          const s = summary[key];
          html += '<div class="trend-stat-item">';
          html += '<div class="ts-label">' + name + '（日均）</div>';
          html += '<div class="ts-value">' + (s.avg !== null ? s.avg : '-') + ' <small style="font-size:10px;font-weight:400;">kg</small></div>';
          html += '<div class="ts-sub">范围 ' + (s.min !== null ? s.min : '-') + ' ~ ' + (s.max !== null ? s.max : '-') + ' | 波动σ=' + (s.std !== null ? s.std : '-');
          html += '</div></div>';
        }
        html += '</div>';
      }

      statsDiv.innerHTML = html;
    }

    // ==================== 智能加药（数据驱动综合判定） ====================

      html += '<button id="dosingModeManual" class="btn btn-outline" style="flex:1;" onclick="switchDosingMode(\'manual\')">✏️ 手动输入参数</button>';

      // 自动模式区域
      html += '<div id="dosingAutoSection">';

      html += '<div class="form-section">进水参数</div>';
      html += '<div class="form-row"><div class="form-group"><label>进水流量 (m³/d)</label><input type="number" name="inFlow" step="0.1" value="10000" required></div><div class="form-group"><label>进水COD (mg/L)</label><input type="number" name="inCod" step="0.1" value="250" required></div></div>';
      html += '<div class="form-row"><div class="form-group"><label>进水氨氮 (mg/L)</label><input type="number" name="inNh3" step="0.01" value="25"></div><div class="form-group"><label>进水总氮 (mg/L)</label><input type="number" name="inTn" step="0.01" value="35" required></div></div>';
      html += '<div class="form-group"><label>进水总磷 (mg/L)</label><input type="number" name="inTp" step="0.01" value="3" required></div>';
      html += '</div></div><div class="modal-footer" style="border:none;padding-top:8px;"><button type="button" class="btn btn-outline" onclick="closeModal()">关闭</button><button type="submit" class="btn btn-primary">计算推荐量</button></div></form>';

      // 结果区域
      html += '<div id="dosingResult" style="margin-top:12px;"></div>';

      html += '</div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">关闭</button></div>';
      openModal(html);
    }

    function switchDosingMode(mode) {
      const autoBtn = document.getElementById('dosingModeAuto');
      const manualBtn = document.getElementById('dosingModeManual');
      const autoSec = document.getElementById('dosingAutoSection');
      const manualSec = document.getElementById('dosingManualSection');
      if (mode === 'auto') {
        autoBtn.className = 'btn btn-primary'; autoBtn.style.flex = '1';
        manualBtn.className = 'btn btn-outline'; manualBtn.style.flex = '1';
        autoSec.style.display = 'block';
        manualSec.style.display = 'none';
      } else {
        manualBtn.className = 'btn btn-primary'; manualBtn.style.flex = '1';
        autoBtn.className = 'btn btn-outline'; autoBtn.style.flex = '1';
        autoSec.style.display = 'none';
        manualSec.style.display = 'block';
      }
    }

    async function runAutoDosing() {
      document.getElementById('btnAutoDosing').textContent = '⏳ 分析中...';
      document.getElementById('btnAutoDosing').disabled = true;
      try {
        const res = await fetch(API + '/api/dosing/analysis?auto=1', { headers: authHeaders() });
        const data = await res.json();
        if (data.error) { toast(data.error, 'error'); document.getElementById('btnAutoDosing').textContent = '🔍 开始智能分析'; document.getElementById('btnAutoDosing').disabled = false; return; }
        renderDosingResult(data);
      } catch (e) { toast('分析失败: ' + e.message, 'error'); }
      document.getElementById('btnAutoDosing').textContent = '🔄 重新分析';
      document.getElementById('btnAutoDosing').disabled = false;
    }

    async function calcDosingAnalysis(e, isAuto) {
      if (e) e.preventDefault();
      let url = API + '/api/dosing/analysis?auto=' + (isAuto ? '1' : '0');
      if (!isAuto && e) {
        const fd = new FormData(e.target);
        const params = new URLSearchParams();
        for (const [k, v] of fd.entries()) params.append(k, v);
        url = API + '/api/dosing/analysis?' + params.toString();
      }
      try {
        const res = await fetch(url, { headers: authHeaders() });
        const data = await res.json();
        if (data.error) { toast(data.error, 'error'); return; }
        renderDosingResult(data);
      } catch (e) { toast('计算失败: ' + e.message, 'error'); }
    }

    function renderDosingResult(data) {
      let html = '';

      // 数据来源 & 输入概览
      html += '<div class="card mb-8"><div class="card-header"><h3>📋 分析概览</h3></div><div class="card-body">';
      html += '<div style="font-size:11px;color:#8c8c8c;margin-bottom:8px;">数据来源：' + (data.dataSource || '-') + '</div>';
      const inp = data.input;
      html += '<div style="display:flex;gap:6px;flex-wrap:wrap;">';
      const inpLabels = [['流量', (inp.inFlow||0).toFixed(0) + ' m³/d'], ['COD', (inp.inCod||0).toFixed(0) + ' mg/L'], ['NH₃-N', (inp.inNh3||0).toFixed(1) + ' mg/L'], ['TN', (inp.inTn||0).toFixed(1) + ' mg/L'], ['TP', (inp.inTp||0).toFixed(2) + ' mg/L']];
      inpLabels.forEach(([l, v]) => { html += '<span style="padding:3px 8px;background:#f0f5ff;border-radius:10px;font-size:12px;color:#1890ff;">' + l + ': ' + v + '</span>'; });
      html += '</div></div></div>';

      // 水质趋势 + 去除效率
      if (data.waterQuality) {
        const wq = data.waterQuality;
        html += '<div class="card mb-8"><div class="card-header"><h3>💧 水质趋势（近14天）</h3></div><div class="card-body no-padding">';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;padding:8px;">';
        ['inCod','inNh3','inTn','inTp','outCod','outNh3','outTn','outTp'].forEach(k => {
          const t = wq.trends[k];
          if (!t || t.avg === null) return;
          const isIn = k.startsWith('in');
          const label = isIn ? '进' : '出';
          const nameMap = { inCod:'COD', inNh3:'NH₃', inTn:'TN', inTp:'TP', outCod:'COD', outNh3:'NH₃', outTn:'TN', outTp:'TP' };
          const tIcon = t.trend === '上升' ? '📈' : t.trend === '下降' ? '📉' : '➡️';
          html += '<div style="text-align:center;padding:6px;background:' + (isIn ? '#fff7e6' : '#e6f7ff') + ';border-radius:6px;">';
          html += '<div style="font-size:10px;color:#8c8c8c;">' + label + '水' + nameMap[k] + '</div>';
          html += '<div style="font-size:14px;font-weight:700;">' + t.avg.toFixed(1) + '</div>';
          html += '<div style="font-size:10px;">' + tIcon + ' ' + t.trend + '</div></div>';
        });
        html += '</div>';

        html += '</div></div>';

        // 水质告警
        if (wq.warnings && wq.warnings.length > 0) {
          html += '<div class="card mb-8" style="border-color:#f5222d;"><div class="card-header" style="color:#f5222d;"><h3>🚨 水质告警</h3></div><div class="card-body">';
          wq.warnings.forEach(w => html += '<div style="font-size:12px;color:#f5222d;margin-bottom:4px;">• ' + w + '</div>');
          html += '</div></div>';
        }
      }

      // 污泥状态
      if (data.sludgeStatus) {
        const ss = data.sludgeStatus;
        html += '<div class="card mb-8"><div class="card-header"><h3>🦠 污泥参数（近14天）</h3></div><div class="card-body no-padding">';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:8px;">';
        ['sv30','svi','mlss'].forEach(k => {
          const s = ss[k];
          if (!s || s.avg === null) return;
          const labels = { sv30:'SV30', svi:'SVI', mlss:'MLSS' };
          const units = { sv30:'%', svi:'mL/g', mlss:'mg/L' };
          const tIcon = s.trend === '上升' ? '📈' : s.trend === '下降' ? '📉' : '➡️';
          const statusCls = s.status.includes('偏高') || s.status.includes('膨胀') ? '#f5222d' : s.status.includes('偏低') ? '#faad14' : '#52c41a';
          html += '<div style="text-align:center;padding:6px;background:#f6ffed;border-radius:6px;">';
          html += '<div style="font-size:10px;color:#8c8c8c;">' + labels[k] + '</div>';
          html += '<div style="font-size:14px;font-weight:700;">' + s.avg.toFixed(1) + '</div>';
          html += '<div style="font-size:9px;color:#8c8c8c;">' + units[k] + '</div>';
          html += '<div style="font-size:10px;margin-top:2px;">' + tIcon + ' ' + s.trend + '</div>';
          html += '<div style="font-size:10px;color:' + statusCls + ';">' + s.status + '</div>';
          html += '</div>';
        });
        html += '</div></div></div>';
      }

      // 诊断日志
      if (data.diagnosisLog && data.diagnosisLog.length > 0) {
        html += '<div class="card mb-8"><div class="card-header"><h3>📝 调整依据</h3></div><div class="card-body no-padding">';
        data.diagnosisLog.forEach(d => {
          const isWarn = d.includes('🚨') || d.includes('⚠️');
          const bg = isWarn ? '#fff2f0' : '#f0f5ff';
          html += '<div style="padding:6px 12px;font-size:12px;background:' + bg + ';border-bottom:1px solid #f0f0f0;line-height:1.5;">' + d + '</div>';
        });
        html += '</div></div>';
      }

      // 推荐结果
      html += '<div class="card mb-8"><div class="card-header"><h3>🧪 药剂推荐量</h3></div><div class="card-body no-padding">';
      (data.recommendations || []).forEach(r => {
        const hasAdjust = r.adjustFactors && Object.values(r.adjustFactors).some(v => Math.abs(v - 1) > 0.001);
        html += '<div class="dosing-chem" style="border:1px solid #f0f0f0;border-radius:8px;padding:10px;margin:6px;">';
        html += '<div class="dc-name" style="font-size:15px;font-weight:700;display:flex;justify-content:space-between;align-items:center;">';
        html += '<span>' + r.chemical + '</span>';
        html += '<span style="font-size:20px;font-weight:700;color:' + (hasAdjust ? '#f5222d' : '#1890ff') + ';">' + r.value + '</span>';
        html += '<span style="font-size:11px;color:#8c8c8c;">' + r.unit + '</span></div>';

        // 调整因子
        if (hasAdjust) {
          html += '<div style="font-size:11px;color:#8c8c8c;margin-top:4px;">基础值: ' + (r.baseValue || '-') + ' ' + r.unit;
          if (r.adjustFactors) {
            Object.entries(r.adjustFactors).forEach(([k, v]) => {
              if (Math.abs(v - 1) > 0.001) {
                const labelMap = { sludge:'污泥调整', trend:'趋势调整', cod:'出水COD调整' };
                html += ' | ' + (labelMap[k] || k) + ': ×' + v.toFixed(2);
              }
            });
          }
          html += '</div>';
        }

        html += '<div style="font-size:11px;color:#bfbfbf;margin-top:2px;">推荐范围: ' + (r.range || []).join(' - ') + ' ' + r.unit + '</div>';
        html += '<div style="font-size:11px;color:#595959;margin-top:4px;">💡 ' + (r.tip || '') + '</div>';

        // 历史对比
        if (r.history && r.history.avg7d) {
          const devCls = r.history.deviation && Math.abs(r.history.deviation) > 30 ? '#f5222d' : '#8c8c8c';
          html += '<div style="font-size:11px;color:' + devCls + ';margin-top:4px;background:#fafafa;padding:4px 8px;border-radius:4px;">';
          html += '📊 ' + r.history.comparison;
          if (r.history.deviation !== null) html += '（偏差' + (r.history.deviation > 0 ? '+' : '') + r.history.deviation + '%）';
          if (r.history.suggestion) html += '<br>' + r.history.suggestion;
          html += '</div>';
        }
        html += '</div>';
      });
      html += '</div></div>';

      // 综合评估
      html += '<div class="card mb-8"><div class="card-header"><h3>📊 综合评估</h3></div><div class="card-body">';
      const statusColor = (data.waterQualityWarnings || []).length > 0 || (data.sludgeWarnings || []).length > 0 ? '#faad14' : '#52c41a';
      const statusIcon = (data.waterQualityWarnings || []).length > 0 || (data.sludgeWarnings || []).length > 0 ? '⚠️' : '✅';
      html += '<div style="text-align:center;font-size:14px;font-weight:600;color:' + statusColor + ';">' + statusIcon + ' ' + (data.overallAssessment || '-') + '</div>';

      if (data.sludgeWarnings && data.sludgeWarnings.length > 0) {
        html += '<div style="margin-top:8px;">';
        data.sludgeWarnings.forEach(w => html += '<div style="font-size:12px;color:#faad14;">• ' + w + '</div>');
        html += '</div>';
      }
      html += '</div></div>';

      // 趋势图
      if (data.charts) {
        html += '<div class="card mb-8"><div class="card-header"><h3>📈 趋势分析图</h3></div><div class="card-body">';
        html += '<div class="chart-container" style="height:200px;"><canvas id="dosingWaterChart"></canvas></div>';
        html += '<div class="chart-container" style="height:180px;margin-top:8px;"><canvas id="dosingSludgeChart"></canvas></div>';
        html += '</div></div>';
      }

      document.getElementById('dosingResult').innerHTML = html;

      // 绘制图表
      if (data.charts) {
        setTimeout(() => {
          const ctx1 = document.getElementById('dosingWaterChart');
          const ctx2 = document.getElementById('dosingSludgeChart');
          if (!ctx1 || !ctx2) return;

          if (chartInstances.dosing1) chartInstances.dosing1.destroy();
          if (chartInstances.dosing2) chartInstances.dosing2.destroy();

          const wqData = data.charts.waterQuality || [];
          chartInstances.dosing1 = new Chart(ctx1, {
            type: 'line',
            data: {
              labels: wqData.map(d => d.date),
              datasets: [
                { label: '进水COD', data: wqData.map(d => d.inCod), borderColor: '#ff4d4f', tension: 0.3, yAxisID: 'y' },
                { label: '进水TN', data: wqData.map(d => d.inTn), borderColor: '#fa8c16', tension: 0.3, yAxisID: 'y' },
                { label: '出水COD', data: wqData.map(d => d.outCod), borderColor: '#1890ff', tension: 0.3, yAxisID: 'y', borderDash: [5,5] },
              ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '进出水水质趋势', font: { size: 12 } } }, scales: { y: { title: { display: true, text: 'mg/L' } }, x: { ticks: { maxTicksLimit: 8 } } } }
          });

          const slData = data.charts.sludge || [];
          chartInstances.dosing2 = new Chart(ctx2, {
            type: 'line',
            data: {
              labels: slData.map(d => d.date),
              datasets: [
                { label: 'SV30(%)', data: slData.map(d => d.sv30), borderColor: '#ff4d4f', tension: 0.3, yAxisID: 'y' },
                { label: 'SVI(mL/g)', data: slData.map(d => d.svi), borderColor: '#fa8c16', tension: 0.3, yAxisID: 'y1' },
                { label: 'MLSS(×100mg/L)', data: slData.map(d => d.mlss ? d.mlss / 100 : null), borderColor: '#1890ff', tension: 0.3, yAxisID: 'y' },
              ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: '污泥指标趋势', font: { size: 12 } } }, scales: { y: { title: { display: true, text: 'SV30(%) / MLSS(×100)' } }, y1: { position: 'right', title: { display: true, text: 'SVI(mL/g)' }, grid: { drawOnChartArea: false } }, x: { ticks: { maxTicksLimit: 8 } } } }
          });
        }, 300);
      }
    }

    // ==================== 污泥综合分析 (SV30/MLSS/SVI/镜检) ====================
    async function openSludgeAnalysis() {
      let html = '<div class="modal-header"><h3>🦠 污泥指标综合分析</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>';
      html += '<div class="modal-body"><div class="loading" id="sludgeLoading">加载中...</div><div id="sludgeContent"></div></div>';
      html += '<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">关闭</button></div>';
      openModal(html);

      try {
        const res = await fetch(API + '/api/sludge/analysis?range=30', { headers: authHeaders() });
        const data = await res.json();
        let content = '';

        // 诊断报告
        if (data.diagnosis && data.diagnosis.length > 0) {
          content += '<div class="card mb-12"><div class="card-header"><h3>📋 综合诊断报告</h3></div><div class="card-body no-padding">';
          data.diagnosis.forEach(d => {
            const levelCls = d.level === 'high' ? 'danger' : d.level === 'warning' ? 'warning' : d.level === 'info' ? 'primary' : 'success';
            const levelIcon = d.level === 'high' ? '🚨' : d.level === 'warning' ? '⚠️' : d.level === 'info' ? 'ℹ️' : '✅';
            content += '<div class="alert-item"><div class="al-icon">' + levelIcon + '</div><div class="al-body"><div class="al-title" style="color:var(--' + levelCls + ')">' + d.item + '</div><div class="al-detail">' + d.detail + '</div></div></div>';
          });
          content += '</div></div>';
        }

        // SV30/MLSS/SVI 三指标卡片
        const cards = [
          { key: 'sv30', label: 'SV30', unit: '%', data: data.sv30, normal: '15-35%', color: '#e74c3c' },
          { key: 'svi', label: 'SVI', unit: 'mL/g', data: data.svi, normal: '50-150mL/g', color: '#f39c12' },
          { key: 'mlss', label: 'MLSS', unit: 'mg/L', data: data.mlss, normal: '2000-6000mg/L', color: '#3498db' },
        ];
        content += '<div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr;">';
        cards.forEach(c => {
          const trendIcon = c.data.trend === '上升' ? '📈' : c.data.trend === '下降' ? '📉' : '➡️';
          const statusCls = c.data.anomalyDays > 3 ? 'danger' : c.data.anomalyDays > 0 ? 'warning' : 'success';
          content += '<div class="stat-card ' + statusCls + '" style="text-align:center;"><div style="font-size:11px;color:#8c8c8c;">' + c.label + '</div><div class="stat-value" style="color:' + c.color + '">' + (c.data.avg || '-') + '</div><div style="font-size:10px;color:#8c8c8c;">' + c.unit + '</div><div style="font-size:10px;margin-top:4px;">' + trendIcon + ' ' + c.data.trend + '</div><div style="font-size:9px;color:var(--' + statusCls + ');">异常' + c.data.anomalyDays + '天</div><div style="font-size:9px;color:#bfbfbf;">正常：' + c.normal + '</div></div>';
        });
        content += '</div>';

        // 膨胀风险评估
        const riskColor = data.bulkingRisk === '高风险' ? '#f5222d' : data.bulkingRisk === '中等风险' ? '#faad14' : '#52c41a';
        content += '<div class="card mb-12"><div class="card-header"><h3>⚡ 污泥膨胀风险评估</h3></div><div class="card-body">';
        content += '<div style="text-align:center;margin-bottom:8px;"><span style="display:inline-block;padding:6px 16px;border-radius:16px;font-size:14px;font-weight:700;background:' + riskColor + '20;color:' + riskColor + ';">' + data.bulkingRisk + '</span></div>';
        content += '<p style="font-size:13px;color:#595959;line-height:1.8;">' + data.bulkingAdvice + '</p>';
        content += '</div></div>';

        // 东西系列对比
        if (data.seriesComparison && data.seriesComparison.eastSV30Avg !== null) {
          content += '<div class="card mb-12"><div class="card-header"><h3>🔀 东西系列SV30对比</h3></div><div class="card-body">';
          content += '<div style="display:flex;gap:8px;"><div style="flex:1;text-align:center;background:#e6f7ff;border-radius:8px;padding:12px;"><div style="font-size:11px;color:#8c8c8c;">东系列</div><div style="font-size:22px;font-weight:700;color:#1890ff;">' + data.seriesComparison.eastSV30Avg + '%</div></div>';
          content += '<div style="flex:1;text-align:center;background:#fff7e6;border-radius:8px;padding:12px;"><div style="font-size:11px;color:#8c8c8c;">西系列</div><div style="font-size:22px;font-weight:700;color:#fa8c16;">' + data.seriesComparison.westSV30Avg + '%</div></div></div>';
          const diff = Math.abs((data.seriesComparison.eastSV30Avg || 0) - (data.seriesComparison.westSV30Avg || 0));
          content += '<div style="text-align:center;margin-top:8px;font-size:12px;color:' + (diff > 5 ? '#f5222d' : '#52c41a') + ';">差异 ' + diff.toFixed(1) + '% | ' + (diff > 5 ? '⚠️ 差异较大，需排查' : '✅ 运行均衡') + '</div>';
          content += '</div></div>';
        }

        // 镜检关键词
        if (data.microscope && data.microscope.keywordStats) {
          const kw = data.microscope.keywordStats;
          const totalKw = Object.values(kw).reduce((a,b) => a+b, 0);
          if (totalKw > 0) {
            content += '<div class="card mb-12"><div class="card-header"><h3>🔬 镜检关键词统计</h3></div><div class="card-body">';
            const kwList = Object.entries(kw).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]);
            content += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
            kwList.forEach(([k, v]) => {
              const ratio = v / totalKw;
              const size = 11 + ratio * 8;
              content += '<span style="font-size:' + size + 'px;padding:4px 8px;background:#f0f5ff;border-radius:12px;color:#1890ff;font-weight:500;">' + k + '(' + v + ')</span>';
            });
            content += '</div></div></div>';
          }

          // 最近镜检记录
          if (data.microscope.records && data.microscope.records.length > 0) {
            content += '<div class="card mb-12"><div class="card-header"><h3>📝 最近镜检记录</h3></div><div class="card-body no-padding">';
            data.microscope.records.slice(-5).reverse().forEach(r => {
              content += '<div class="inv-item" style="flex-direction:column;align-items:flex-start;"><div style="font-size:13px;font-weight:600;">' + r.date + '</div><div style="font-size:12px;color:#595959;margin-top:4px;">' + (r.record || '无记录') + '</div><div style="font-size:11px;color:#8c8c8c;margin-top:2px;">SV30: ' + (r.sv30 || '-') + '% | SVI: ' + (r.svi || '-') + ' | MLSS: ' + (r.mlss || '-') + 'mg/L</div></div>';
            });
            content += '</div></div>';
          }
        }

        document.getElementById('sludgeLoading').classList.add('hidden');
        document.getElementById('sludgeContent').innerHTML = content;
      } catch (e) {
        document.getElementById('sludgeLoading').innerHTML = '<div class="empty">加载失败：' + e.message + '</div>';
      }
    }

    // ==================== 数据问答 ====================
    function openSludgeQA() {
      let html = '<div class="modal-header"><h3>💬 污泥数据智能问答</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>';

      html += '<p style="font-size:12px;color:#8c8c8c;margin-bottom:8px;">💡 可问：SV30趋势、SVI超标、MLSS是否正常、污泥膨胀风险、镜检丝状菌、东西系列对比、水温、回流比等</p>';

      ['SV30最近趋势如何？', 'SVI有没有超标？', 'MLSS是否偏低？', '污泥膨胀风险评估', '镜检中丝状菌情况', '东西系列SV30对比', '最近水温变化'].forEach(q => {
        html += '<span class="filter-chip" onclick="askSludgeQA(\'' + q + '\')" style="cursor:pointer;">' + q + '</span>';
      });
      html += '</div>';

    async function askSludgeQA(question) {
      const q = question || document.getElementById('qaInput').value.trim();
      if (!q) return;
      document.getElementById('qaResult').innerHTML = '<div class="loading">思考中...</div>';
      try {
        const res = await fetch(API + '/api/sludge/qa?q=' + encodeURIComponent(q), { headers: authHeaders() });
        const data = await res.json();
        let html = '<div class="card"><div class="card-header"><h3>❓ ' + data.question + '</h3></div><div class="card-body">';
        html += '<div style="font-size:14px;line-height:1.8;white-space:pre-wrap;">' + data.answer + '</div>';
        html += '<div style="font-size:10px;color:#bfbfbf;margin-top:8px;">回答时间：' + new Date(data.answerTime).toLocaleString('zh-CN') + '</div>';
        html += '</div></div>';

        // 如果有数据点，画小图
        if (data.dataPoints && data.dataPoints.length > 1 && data.dataPoints[0].value !== undefined) {
          html += '<div class="card mt-8"><div class="card-body"><div class="chart-container" style="height:200px;"><canvas id="qaChart"></canvas></div></div></div>';
          setTimeout(() => {
            const ctx = document.getElementById('qaChart');
            if (!ctx) return;
            if (chartInstances.qa) chartInstances.qa.destroy();
            const labels = data.dataPoints.map(d => d.date.slice(5));
            const values = data.dataPoints.map(d => d.value);
            chartInstances.qa = new Chart(ctx, {
              type: 'line',
              data: { labels, datasets: [{ label: q.includes('SV30')||q.includes('sv30') ? 'SV30(%)' : q.includes('SVI')||q.includes('svi') ? 'SVI(mL/g)' : q.includes('MLSS')||q.includes('mlss') ? 'MLSS(mg/L)' : '数值', data: values, borderColor: '#1890ff', tension: 0.3, fill: false }] },
              options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { font: { size: 10 } } }, x: { ticks: { font: { size: 10 }, maxTicksLimit: 10 } } }, interaction: { intersect: false, mode: 'index' } }
            });
          }, 200);
        }

        document.getElementById('qaResult').innerHTML = html;
      } catch (e) {
        document.getElementById('qaResult').innerHTML = '<div class="empty">查询失败：' + e.message + '</div>';
      }
    }

    async function doAddUser() {
      const username = document.getElementById('newUsername')?.value?.trim();
      const name = document.getElementById('newName')?.value?.trim();
      const password = document.getElementById('newPassword')?.value;
      const role = document.getElementById('newRole')?.value;
      const phone = document.getElementById('newPhone')?.value?.trim();
      const groupId = document.getElementById('newGroupId')?.value;
      if (!username || !name || !password || !role) { toast('请填写必填字段', 'error'); return; }
      try {
        const res = await fetch(API + '/api/users', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ username, name, password, role, phone, groupId }) });
        const data = await res.json();
        if (res.ok) { toast('用户创建成功'); loadUserList(); }
        else { toast(data.error || '创建失败', 'error'); }
      } catch (e) { toast('创建失败', 'error'); }
    }

    async function doEditUser(id) {
      const name = document.getElementById('editName')?.value?.trim();
      const role = document.getElementById('editRole')?.value;
      const phone = document.getElementById('editPhone')?.value?.trim();
      const groupId = document.getElementById('editGroupId')?.value;
      const password = document.getElementById('editPassword')?.value;
      const body = { name, role, phone, groupId };
      if (password) body.password = password;
      try {
        const res = await fetch(API + '/api/users/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
        const data = await res.json();
        if (res.ok) { toast('用户信息已更新'); loadUserList(); }
        else { toast(data.error || '更新失败', 'error'); }
      } catch (e) { toast('更新失败', 'error'); }
    }

    async function toggleUserStatus(id, newStatus) {
      const action = newStatus === 'active' ? '启用' : '禁用';
      if (!confirm('确认' + action + '该用户？')) return;
      try {
        const res = await fetch(API + '/api/users/' + id, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ status: newStatus }) });
        const data = await res.json();
        if (res.ok) { toast('用户已' + action); loadUserList(); }
        else { toast(data.error || '操作失败', 'error'); }
      } catch (e) { toast('操作失败', 'error'); }
    }

    async function renderShift() {

        const schedules = weekData.data || [];

        let html = '<div class="page-header"><h2>🔄 交班排班管理</h2></div>';

        // 快捷操作
        html += '<div class="card mb-12"><div class="card-body" style="display:flex;gap:8px;flex-wrap:wrap;">';
        html += '<button class="btn btn-primary" onclick="openAddHandover()">📋 填写交班记录</button>';
        html += '<button class="btn btn-outline" onclick="openAddSchedule()">📅 编辑排班</button>';

        const shifts = ['白班', '夜班'];
        const shiftIcons = { '白班': '☀️', '夜班': '🌙' };
        html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">';
        shifts.forEach(shift => {
          const ho = handovers.find(h => h.shift === shift);
          if (ho) {
            html += '<div style="background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px;padding:12px;">';
            html += '<div style="font-size:13px;font-weight:600;">' + (shiftIcons[shift] || '') + ' ' + shift + ' <span style="color:#52c41a;font-size:11px;">✅已交班</span></div>';
            html += '<div style="font-size:11px;color:#595959;margin-top:4px;">交班：' + (ho.handoverPerson || '-') + ' → ' + (ho.receivePerson || '-') + '</div>';
            html += '<div style="font-size:11px;color:#8c8c8c;margin-top:2px;">状态：' + (ho.runStatus || '-') + '</div>';
            if (ho.pendingItems) html += '<div style="font-size:11px;color:#faad14;margin-top:2px;">⚠️ 待处理：' + ho.pendingItems.slice(0, 40) + '</div>';
            html += '</div>';
          } else {
            html += '<div style="background:#fffbe6;border:1px dashed #ffe58f;border-radius:8px;padding:12px;">';
            html += '<div style="font-size:13px;font-weight:600;">' + (shiftIcons[shift] || '') + ' ' + shift + ' <span style="color:#faad14;font-size:11px;">⏳未填写</span></div>';
            html += '<div style="font-size:11px;color:#8c8c8c;margin-top:4px;">点击"填写交班记录"完成交班</div>';
            html += '</div>';
          }
        });
        html += '</div></div></div>';

        // 本周排班表
        html += '<div class="card"><div class="card-header"><h3>📅 本周排班（' + weekData.weekStart + ' ~ ' + weekData.weekEnd + '）</h3></div>';
        if (schedules.length === 0) {
          html += '<div class="card-body"><div class="empty">本周暂无排班记录，点击"编辑排班"开始排班</div></div>';
        } else {
          // 组织成日期 → 班次 → 班组的表格
          const dateMap = {};
          schedules.forEach(s => {
            if (!dateMap[s.date]) dateMap[s.date] = {};
            dateMap[s.date][s.shift] = s;
          });
          html += '<div class="card-body" style="padding:0;overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">';
          html += '<thead><tr style="background:#f0f5ff;"><th style="padding:8px;text-align:center;">日期</th><th style="padding:8px;text-align:center;">☀️ 白班</th><th style="padding:8px;text-align:center;">🌙 夜班</th></tr></thead><tbody>';
          Object.entries(dateMap).sort(([a],[b]) => a.localeCompare(b)).forEach(([date, shiftMap]) => {
            html += '<tr style="border-bottom:1px solid #f0f0f0;">';
            html += '<td style="padding:8px;text-align:center;font-weight:600;">' + date.slice(5) + '</td>';
            ['白班','夜班'].forEach(shift => {
              const s = shiftMap[shift];
              if (s) {
                html += '<td style="padding:8px;text-align:center;"><div style="font-weight:600;color:#1890ff;">' + (s.team || '-') + '</div><div style="color:#595959;">' + (s.members || '').replace(/,/g, ' ') + '</div></td>';
              } else {
                html += '<td style="padding:8px;text-align:center;color:#bfbfbf;">-</td>';
              }
            });
            html += '</tr>';
          });
          html += '</tbody></table></div>';
        }
        html += '</div>';

        page.innerHTML = html;
      } catch (e) { page.innerHTML = '<div class="empty">加载失败：' + e.message + '</div>'; }
    }

    async function submitSchedule(e) {
      e.preventDefault();
      const fd = new FormData(e.target);
      const record = {};
      for (const [k, v] of fd.entries()) if (v !== '') record[k] = v;
      try {
        const res = await fetch(API + '/api/shift_schedule', { method: 'POST', headers: authHeaders(), body: JSON.stringify(record) });
        const data = await res.json();
        if (data.success) { toast('排班已添加'); closeModal(); renderShift(); }
        else toast(data.error || '添加失败', 'error');
      } catch (e) { toast('网络错误', 'error'); }
    }

    async function loadMonthlyReport() {
      const year = document.getElementById('reportYear').value;
      const month = document.getElementById('reportMonth').value;
      const container = document.getElementById('monthlyReportContent');
      container.innerHTML = '<div class="loading">加载中...</div>';
      try {
        const res = await fetch(API + '/api/report/monthly?year=' + year + '&month=' + month, { headers: authHeaders() });
        const data = await res.json();
        if (data.error) { container.innerHTML = '<div class="empty">' + data.error + '</div>'; return; }

        const wq = data.waterQuality || {};
        const op = data.operation || {};
        const chem = data.chemical || {};
        const dw = data.dewatering || {};
        const alrt = data.alerts || {};

        let html = '<div style="background:#f6f8fa;border-radius:8px;padding:12px;margin-bottom:8px;">';
        html += '<div style="font-size:14px;font-weight:700;color:#1890ff;margin-bottom:8px;">' + year + '年' + parseInt(month) + '月 运行月报</div>';

        // 水量
        html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;">';
        [['月进水量', (wq.totalInFlow || 0).toFixed(0) + ' m³'], ['月出水量', (op.totalOutFlow || 0).toFixed(0) + ' m³'], ['月用电量', (op.totalElec || 0).toFixed(0) + ' kWh'], ['污泥产量', (dw.totalSludge || 0).toFixed(1) + ' 吨']].forEach(([k, v]) => {
          html += '<div style="background:#fff;border-radius:6px;padding:8px;text-align:center;"><div style="font-size:11px;color:#8c8c8c;">' + k + '</div><div style="font-size:16px;font-weight:700;color:#1890ff;">' + (v || '-') + '</div></div>';
        });
        html += '</div>';

        // 出水水质
        html += '<div style="font-size:12px;font-weight:600;margin-bottom:6px;">出水水质（月均值）</div>';
        html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;">';
        const limits = { 'COD': [wq.avgOutCod, 50], 'NH₃-N': [wq.avgOutNh3, 5], 'TN': [wq.avgOutTn, 15], 'TP': [wq.avgOutTp, 0.5] };
        Object.entries(limits).forEach(([k, [v, lim]]) => {
          const exceed = v && v > lim;
          html += '<div style="background:' + (exceed ? '#fff2f0' : '#f6ffed') + ';border:1px solid ' + (exceed ? '#ffa39e' : '#b7eb8f') + ';border-radius:6px;padding:6px;text-align:center;">';
          html += '<div style="font-size:10px;color:#8c8c8c;">' + k + '（限≤' + lim + '）</div>';
          html += '<div style="font-size:14px;font-weight:700;color:' + (exceed ? '#f5222d' : '#52c41a') + ';">' + (v !== null && v !== undefined ? v : '-') + '</div>';
          html += '<div style="font-size:10px;color:#8c8c8c;">mg/L</div>';
          html += '</div>';
        });
        html += '</div>';

        // 超标情况
        if (wq.codExceedHours > 0 || wq.nh3ExceedHours > 0 || wq.tnExceedHours > 0) {
          html += '<div style="background:#fff2f0;border-radius:6px;padding:8px;margin-bottom:8px;font-size:12px;">';
          html += '<span style="color:#f5222d;font-weight:600;">⚠️ 超标统计：</span>';
          if (wq.codExceedHours > 0) html += 'COD超标 ' + wq.codExceedHours + ' 小时 ';
          if (wq.nh3ExceedHours > 0) html += '氨氮超标 ' + wq.nh3ExceedHours + ' 小时 ';
          if (wq.tnExceedHours > 0) html += '总氮超标 ' + wq.tnExceedHours + ' 小时';
          html += '</div>';
        }

        // 药剂投加
        html += '<div style="font-size:12px;font-weight:600;margin-bottom:6px;">药剂投加（月累计）</div>';
        html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">';
        [['碳源', chem.totalCarbonSource], ['PAC', chem.totalPac], ['葡萄糖', chem.totalGlucose], ['次氯酸钠', chem.totalNaclo]].forEach(([k, v]) => {
          html += '<span style="background:#e6f7ff;border-radius:10px;padding:3px 8px;font-size:12px;color:#1890ff;">' + k + ': ' + (v || 0) + ' kg</span>';
        });
        html += '</div>';

        // 预警汇总
        html += '<div style="font-size:12px;"><span style="color:#8c8c8c;">预警：</span>共 <b>' + (alrt.total || 0) + '</b> 条，高级 <b style="color:#f5222d;">' + (alrt.high || 0) + '</b> 条，处理率 <b style="color:#52c41a;">' + (alrt.total > 0 ? Math.round(alrt.resolved / alrt.total * 100) : 100) + '%</b></div>';
        html += '</div>';

        container.innerHTML = html;
      } catch (e) { container.innerHTML = '<div class="empty">加载失败：' + e.message + '</div>'; }
    }
